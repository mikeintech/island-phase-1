<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#101211" />
    <title>Island Phase 1</title>
  </head>
  <body>
    <main id="app">
      <div id="game"></div>
      <section id="hud" aria-label="Game status">
        <div class="hud-row">
          <div class="brand">ISLAND</div>
          <div class="score" id="score">0 - 0</div>
          <div class="clock" id="clock">12.0</div>
        </div>
        <div class="mode-toggle" role="group" aria-label="Mode">
          <button id="freeMode" class="active" type="button">Free Play</button>
          <button id="scoreMode" type="button">AI To 7</button>
        </div>
        <div class="online-panel" aria-label="Multiplayer">
          <div class="online-actions">
            <button id="hostButton" type="button">Host</button>
            <button id="joinButton" type="button">Join</button>
          </div>
          <input id="peerCode" type="text" inputmode="text" autocomplete="off" autocapitalize="characters" spellcheck="false" maxlength="4" placeholder="CODE" />
          <div id="onlineStatus" class="online-status">Solo · AI defense</div>
        </div>
      </section>
      <button id="labToggle" class="lab-toggle" type="button">Lab</button>
      <section id="labPanel" class="lab-panel hidden" aria-label="Mechanics lab">
        <div class="lab-title">MECH LAB</div>
        <div id="labReadout" class="lab-readout"></div>
      </section>
      <section id="resultPanel" class="result-panel hidden" aria-live="polite">
        <div id="resultText" class="result-text">Pure Swish</div>
        <dl id="breakdown" class="breakdown"></dl>
      </section>
    </main>
    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
